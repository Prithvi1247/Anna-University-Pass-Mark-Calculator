<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anna University Pass Marks Calculator | GOATED Edition</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #050505;
    --surface: #0f0f12;
    --card: rgba(20, 20, 25, 0.8);
    --border: rgba(255, 255, 255, 0.08);
    --amber: #ffaa00;
    --amber-glow: rgba(255, 170, 0, 0.3);
    --red: #ff4444;
    --green: #00ff88;
    --text: #ffffff;
    --text-dim: #88888e;
    --radius: 24px;
    --sans: 'Syne', sans-serif;
    --mono: 'JetBrains Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
    background-image: 
      radial-gradient(circle at 50% -20%, #1a1a25 0%, transparent 50%),
      radial-gradient(circle at 0% 100%, #0a0a0f 0%, transparent 40%);
  }

  .container {
    width: 100%;
    max-width: 480px;
    padding: 40px 20px;
    z-index: 1;
  }

  /* Header Section */
  header {
    text-align: center;
    margin-bottom: 48px;
    animation: fadeInDown 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
  }

  .badge {
    display: inline-block;
    padding: 6px 12px;
    background: var(--amber-glow);
    border: 1px solid var(--amber);
    color: var(--amber);
    border-radius: 100px;
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 16px;
  }

  h1 {
    font-size: 36px;
    font-weight: 800;
    line-height: 1.1;
    letter-spacing: -1px;
    margin-bottom: 12px;
  }

  .subtitle {
    font-size: 16px;
    color: var(--text-dim);
    font-weight: 400;
  }

  /* Main Card */
  .main-card {
    background: var(--card);
    backdrop-filter: blur(20px);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 32px;
    box-shadow: 0 24px 48px rgba(0,0,0,0.4);
    animation: fadeInUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) 0.1s backwards;
  }

  .input-group {
    margin-bottom: 32px;
  }

  .label-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: 16px;
  }

  label {
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-dim);
  }

  .val-display {
    font-family: var(--mono);
    font-size: 40px;
    font-weight: 700;
    color: var(--amber);
    line-height: 1;
  }

  .val-display span {
    font-size: 16px;
    color: var(--text-dim);
    margin-left: 4px;
  }

  /* Custom Slider */
  .slider-container {
    position: relative;
    height: 40px;
    display: flex;
    align-items: center;
  }

  input[type="range"] {
    -webkit-appearance: none;
    width: 100%;
    height: 6px;
    background: rgba(255,255,255,0.1);
    border-radius: 10px;
    outline: none;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 28px;
    height: 28px;
    background: var(--text);
    border-radius: 50%;
    cursor: pointer;
    box-shadow: 0 0 20px rgba(255,255,255,0.4);
    transition: transform 0.2s cubic-bezier(0.2, 0.8, 0.2, 1);
  }

  input[type="range"]::-webkit-slider-thumb:hover {
    transform: scale(1.1);
  }

  /* Action Button */
  .calc-btn {
    width: 100%;
    padding: 20px;
    background: var(--text);
    color: var(--bg);
    border: none;
    border-radius: 16px;
    font-family: var(--sans);
    font-size: 16px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
    position: relative;
    overflow: hidden;
  }

  .calc-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 24px rgba(255,255,255,0.15);
  }

  .calc-btn:active {
    transform: translateY(0);
  }

  /* Result Section */
  .result-section {
    display: none;
    margin-top: 32px;
    animation: fadeInUp 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
  }

  .result-section.visible {
    display: block;
  }

  .fate-card {
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 24px;
    text-align: center;
    margin-bottom: 20px;
  }

  .fate-title {
    font-size: 14px;
    font-weight: 700;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .fate-number {
    font-family: var(--mono);
    font-size: 56px;
    font-weight: 700;
    margin-bottom: 8px;
  }

  .fate-number span {
    font-size: 24px;
    color: var(--text-dim);
  }

  .fate-msg {
    font-size: 18px;
    font-weight: 700;
    color: var(--amber);
  }

  /* Grade Grid */
  .grade-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 24px;
  }

  .grade-box {
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    padding: 16px;
    border-radius: 16px;
    text-align: left;
  }

  .grade-box label {
    font-size: 10px;
    margin-bottom: 4px;
  }

  .grade-val {
    font-family: var(--mono);
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
  }

  /* Info Section */
  .info-strip {
    background: rgba(255,255,255,0.02);
    border-radius: 16px;
    padding: 16px;
    font-size: 13px;
    color: var(--text-dim);
    margin-bottom: 24px;
  }

  .info-strip b { color: var(--text); display: block; margin-bottom: 4px; }

  /* Share & Reset */
  .secondary-actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .action-btn {
    padding: 16px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }

  .action-btn:hover {
    background: rgba(255,255,255,0.05);
    border-color: var(--text-dim);
  }

  /* Footer */
  footer {
    margin-top: 64px;
    text-align: center;
    font-size: 12px;
    color: var(--text-dim);
    opacity: 0.5;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--text);
    color: var(--bg);
    padding: 12px 24px;
    border-radius: 100px;
    font-weight: 800;
    font-size: 14px;
    transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
    z-index: 1000;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  /* Animations */
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeInDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Responsive */
  @media (max-width: 400px) {
    h1 { font-size: 28px; }
    .fate-number { font-size: 48px; }
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <div class="badge">R2017 / R2021</div>
    <h1>I thought I was safe… I wasn’t 💀</h1>
    <p class="subtitle">Enter your internals and see if you're actually passing</p>
  </header>

  <main class="main-card">
    <div class="input-group">
      <div class="label-row">
        <label>Internal Marks</label>
        <div class="val-display" id="val-display">14<span>/20</span></div>
      </div>
      <div class="slider-container">
        <input type="range" id="internal-slider" min="0" max="20" value="14" oninput="updateUI(this.value)">
      </div>
    </div>

    <button class="calc-btn" onclick="calculateFate()">Calculate My Fate</button>

    <div id="result-section" class="result-section">
      <div class="fate-card">
        <div class="fate-title">Required External</div>
        <div class="fate-number" id="fate-number">--<span>/80</span></div>
        <div class="fate-msg" id="fate-msg">--</div>
      </div>

      <div class="grade-grid">
        <div class="grade-box">
          <label>A Grade (~75+)</label>
          <div class="grade-val" id="a-req">--</div>
        </div>
        <div class="grade-box">
          <label>O Grade (~90+)</label>
          <div class="grade-val" id="o-req">--</div>
        </div>
      </div>

      <div class="info-strip">
        <b>AU Pattern:</b>
        20 Internal + 80 External. Pass needs 50 total AND 32 external.
      </div>

      <div class="secondary-actions">
        <button class="action-btn" onclick="copyResult()">Copy Result</button>
        <button class="action-btn" onclick="resetApp()">Try Again 😭</button>
      </div>
    </div>
  </main>

  <footer>
    Built for Anna University Students • Not an official tool
  </footer>
</div>

<div id="toast" class="toast">Copied to clipboard!</div>

<script>
  let currentReq = 0;
  let possible = true;

  function updateUI(val) {
    document.getElementById('val-display').innerHTML = `${val}<span>/20</span>`;
    const pct = (val / 20) * 100;
    document.getElementById('internal-slider').style.background = `linear-gradient(to right, var(--text) ${pct}%, rgba(255,255,255,0.1) ${pct}%)`;
  }

  function calculateFate() {
    const internal = parseInt(document.getElementById('internal-slider').value);
    const req = Math.max(32, 50 - internal);
    const aReq = Math.max(32, 75 - internal);
    const oReq = Math.max(32, 91 - internal);
    
    currentReq = req;
    possible = req <= 80;

    const section = document.getElementById('result-section');
    const num = document.getElementById('fate-number');
    const msg = document.getElementById('fate-msg');
    const aVal = document.getElementById('a-req');
    const oVal = document.getElementById('o-req');

    section.classList.add('visible');

    if (!possible) {
      num.innerHTML = "IMPOSSIBLE 💀";
      msg.innerText = "even if you get full marks… passing is impossible 💀";
      msg.style.color = "var(--red)";
      aVal.innerText = "×";
      oVal.innerText = "×";
    } else {
      num.innerHTML = `${req}<span>/80</span>`;
      
      if (req <= 40) {
        msg.innerText = "okay this is manageable 😌";
        msg.style.color = "var(--green)";
      } else if (req <= 60) {
        msg.innerText = "this is gonna hurt 😭";
        msg.style.color = "var(--amber)";
      } else {
        msg.innerText = "yeah… you’re in danger 💀";
        msg.style.color = "var(--red)";
      }

      aVal.innerText = aReq <= 80 ? `${aReq}/80` : "×";
      oVal.innerText = oReq <= 80 ? `${oReq}/80` : "×";
    }

    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
  }

  function copyResult() {
    const text = possible 
      ? `I need ${currentReq}/80 to pass Anna University 💀\nhttps://annapassmarks.vercel.app/`
      : `Passing Anna University is impossible for me 💀\nhttps://annapassmarks.vercel.app/`;
    
    navigator.clipboard.writeText(text).then(() => {
      const toast = document.getElementById('toast');
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    });
  }

  function resetApp() {
    document.getElementById('internal-slider').value = 14;
    updateUI(14);
    document.getElementById('result-section').classList.remove('visible');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  // Init
  updateUI(14);
</script>

</body>
</html>
